<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAEIN JUNG</title>
<meta name="description" content="A visual archive of self.">
<style>
  :root {
    --paper: #ffffff;
    --ink: #0a0a0a;
    --ink-soft: rgba(10, 10, 10, 0.35);
    --hair: rgba(10, 10, 10, 0.16);
    --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: 10px;
    letter-spacing: 0.06em;
    -webkit-font-smoothing: antialiased;
    text-transform: uppercase;
  }

  ::selection { background: var(--ink); color: var(--paper); }

  /* ---------- header ---------- */

  .top {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 40;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 16px;
    background: var(--paper);
    font-size: 10px;
    letter-spacing: 0.1em;
  }

  .top .mid {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 0.14em;
  }

  .top button {
    all: unset;
    font: inherit;
    letter-spacing: inherit;
    text-transform: inherit;
    cursor: pointer;
  }

  .top .cnt { color: var(--ink); }

  .top .right {
    display: flex;
    gap: 24px;
  }

  .top .hbtn {
    color: var(--ink);
    transition: transform 160ms var(--ease-out);
  }

  .top .hbtn:hover { text-decoration: underline; text-underline-offset: 3px; }
  .top .hbtn:active { transform: scale(0.95); }

  /* ---------- filter panel (hidden dropdown) ---------- */

  .fpanel {
    position: fixed;
    top: 40px;
    left: 0; right: 0;
    z-index: 39;
    background: var(--paper);
    overflow: hidden;
    max-height: 0;
    transition: max-height 420ms var(--ease-out);
  }

  .fpanel.open { max-height: 380px; }

  .fpanel .finner {
    border-top: 1px solid var(--hair);
    border-bottom: 1px solid var(--hair);
  }

  .fcols {
    display: grid;
    grid-template-columns: minmax(190px, 27%) minmax(190px, 27%) 1fr;
  }

  .fcol { border-right: 1px solid var(--hair); }
  .fcol:last-child { border-right: 0; }

  .fhead {
    display: flex;
    align-items: center;
    height: 38px;
    padding: 0 16px;
    border-bottom: 1px solid var(--hair);
    color: var(--ink);
  }

  .fopts { padding: 30px 16px 44px; }

  .fcol .f {
    all: unset;
    display: block;
    font: inherit;
    letter-spacing: inherit;
    text-transform: inherit;
    cursor: pointer;
    color: var(--ink-soft);
    line-height: 2.15;
    transition: color 200ms var(--ease-out);
  }

  .fcol .f:hover,
  .fcol .f.on { color: var(--ink); }

  .fclose {
    all: unset;
    margin-left: auto;
    font: inherit;
    letter-spacing: inherit;
    text-transform: inherit;
    cursor: pointer;
    color: var(--ink);
  }

  .fclose:hover { text-decoration: underline; text-underline-offset: 3px; }

  /* ---------- canvas + grid ---------- */

  .canvas {
    margin: 0 auto;
  }

  .masonry {
    width: 100vw;
    padding-top: 40px;
    columns: 4;
    column-gap: 0;
    transform-origin: 0 0;
  }

  .item {
    position: relative;
    break-inside: avoid;
    cursor: crosshair;
    overflow: hidden; /* blur stays exactly inside the image bounds */
  }

  .frame { display: block; overflow: hidden; }

  /* modular vertical rhythm — 6 / 12 / 24, repeating */
  .sp-a { margin-bottom: 6vh; }
  .sp-b { margin-bottom: 12vh; }
  .sp-c { margin-bottom: 24vh; }

  .item img,
  .item video {
    display: block;
    width: 100%;
    height: auto;
    background: #f2f2f2;
    filter: saturate(0.72) contrast(0.97);
  }

  .item figcaption {
    display: block;
    position: relative;
    z-index: 1; /* stays above any blur bleeding out of the frame */
    background: var(--paper);
    padding: 8px 10px 0;
    height: 26px;
    line-height: 1;
    font-size: 9.5px;
    letter-spacing: 0.1em;
    color: var(--ink);
  }

  /* ---------- reveal motion ---------- */

  .item {
    opacity: 0;
    transition: opacity 900ms var(--ease-out);
    transition-delay: var(--d, 0ms);
  }

  .item .frame {
    filter: blur(12px);
    transform: scale(1.04);
    transition:
      filter 900ms var(--ease-out),
      transform 900ms var(--ease-out);
    transition-delay: var(--d, 0ms);
  }

  .item.in { opacity: 1; }

  .item.in .frame {
    filter: blur(0);
    transform: scale(1);
  }

  @media (hover: hover) and (pointer: fine) {
    .item img,
    .item video {
      will-change: filter, transform;
      transition: filter 220ms var(--ease-out), transform 220ms var(--ease-out);
    }
    .item:hover img,
    .item:hover video { filter: saturate(1) contrast(1); }
    .masonry:has(.item:hover) .item:not(:hover) img,
    .masonry:has(.item:hover) .item:not(:hover) video {
      filter: blur(6px) saturate(0.72) contrast(0.97);
      transform: scale(1.05); /* covers the blur's soft edge inside the frame */
    }
    /* videos are composited layers — scaling them breaks clipping and
       opens a gap at their edges; blur only, never scale */
    .item video,
    .item:hover video,
    .masonry:has(.item:hover) .item:not(:hover) video {
      transform: none;
    }
  }

  /* ---------- lightbox ---------- */

  .lightbox {
    position: fixed;
    inset: 0;
    z-index: 60;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.75);
    -webkit-backdrop-filter: blur(24px) saturate(1.1);
    backdrop-filter: blur(24px) saturate(1.1);
    opacity: 0;
    pointer-events: none;
    transition: opacity 360ms var(--ease-out);
  }

  .lightbox.open {
    opacity: 1;
    pointer-events: auto;
  }

  .lightbox img,
  .lightbox video {
    max-width: min(88vw, 1240px);
    max-height: 80vh;
    display: block;
    transform: scale(0.97);
    filter: blur(10px);
    opacity: 0;
    transition:
      transform 560ms var(--ease-out),
      filter 560ms var(--ease-out),
      opacity 560ms var(--ease-out);
  }

  .lightbox.open img.ready,
  .lightbox.open video.ready {
    transform: scale(1);
    filter: blur(0);
    opacity: 1;
  }

  .lightbox .lb-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    padding: 14px 16px;
    font-size: 10px;
    letter-spacing: 0.12em;
  }

  .lightbox button {
    all: unset;
    font: inherit;
    letter-spacing: inherit;
    text-transform: inherit;
    cursor: pointer;
    color: var(--ink);
    transition: transform 160ms var(--ease-out);
  }

  .lightbox button:active { transform: scale(0.95); }

  .lb-zone {
    position: absolute;
    top: 0; bottom: 0;
    width: 50%;
    z-index: -1;
  }
  .lb-zone--prev { left: 0; cursor: w-resize; }
  .lb-zone--next { right: 0; cursor: e-resize; }

  body.locked { overflow: hidden; }

  /* ---------- zoom control ---------- */

  .zoom {
    position: fixed;
    right: 16px;
    bottom: 16px;
    z-index: 40;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 16px;
    font-size: 10px;
    letter-spacing: 0.12em;
    background: #fafafa;
    border-radius: 14px;
    box-shadow:
      6px 6px 14px rgba(10, 10, 10, 0.09),
      -6px -6px 14px rgba(255, 255, 255, 1),
      inset 0 0 0 1px rgba(255, 255, 255, 0.6);
    transition: box-shadow 200ms var(--ease-out);
  }

  .zoom:has(button:active) {
    box-shadow:
      inset 3px 3px 8px rgba(10, 10, 10, 0.07),
      inset -3px -3px 8px rgba(255, 255, 255, 1);
  }

  .zoom button {
    all: unset;
    font: inherit;
    letter-spacing: inherit;
    cursor: pointer;
    color: var(--ink);
    transition: transform 160ms var(--ease-out);
  }

  .zoom button:active { transform: scale(0.94); }

  .zoom button svg { display: block; }

  .zoom .pct {
    color: var(--ink-soft);
    min-width: 44px;
    text-align: center;
  }

  /* ---------- mobile ---------- */

  @media (max-width: 900px) {
    .masonry { columns: 3; }
    .sp-a { margin-bottom: 4vh; }
    .sp-b { margin-bottom: 8vh; }
    .sp-c { margin-bottom: 16vh; }
  }

  @media (max-width: 600px) {
    .masonry { columns: 2; }
    .item figcaption { font-size: 8.5px; }
  }

  /* ---------- reduced motion ---------- */

  @media (prefers-reduced-motion: reduce) {
    .item {
      transition: opacity 300ms ease;
    }
    .item .frame {
      filter: none;
      transform: none;
      transition: none;
    }
    .lightbox img {
      transform: none;
      filter: none;
      transition: opacity 300ms ease;
    }
  }
</style>

<div class="zoom" aria-label="Zoom">
  <button id="zoom-out" aria-label="Zoom out">&minus;</button>
  <button class="pct" id="zoom-pct" aria-label="Reset zoom">4 col</button>
  <button id="zoom-in" aria-label="Zoom in">+</button>
</div>

<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
  <div class="lb-bar">
    <span id="lb-counter">001 / 104</span>
    <button id="lb-close" aria-label="Close">Close</button>
  </div>
  <div class="lb-zone lb-zone--prev" id="lb-prev" aria-hidden="true"></div>
  <div class="lb-zone lb-zone--next" id="lb-next" aria-hidden="true"></div>
  <img id="lb-img" src="" alt="">
  <video id="lb-vid" muted loop playsinline style="display:none"></video>
</div>

<script>
  const grid = document.getElementById('grid');
  let items = Array.from(grid.querySelectorAll('.item'));
  let visible = items.slice();
  const total = String(items.length).padStart(3, '0');
  const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;

  /* ---- scroll reveal with per-batch stagger ---- */
  let batch = 0;
  let batchTime = 0;
  const reveal = new IntersectionObserver((entries) => {
    const now = performance.now();
    if (now - batchTime > 150) batch = 0;
    entries.forEach((entry) => {
      if (!entry.isIntersecting) return;
      entry.target.style.setProperty('--d', (batch * 60) + 'ms');
      batch += 1;
      batchTime = now;
      entry.target.classList.add('in');
      reveal.unobserve(entry.target);
    });
  }, { rootMargin: '0px 0px -5% 0px', threshold: 0.05 });
  items.forEach((el) => reveal.observe(el));

  function revealAll() {
    items.forEach((el) => {
      el.style.setProperty('--d', '0ms');
      el.classList.add('in');
      reveal.unobserve(el);
    });
  }

  /* ---- FLIP morph: everything glides + blurs to its new place.
     Interruptible — a new morph starts from current visual positions,
     so continuous gestures stay fluid ---- */
  let cleanupTimer = 0;

  function flip(mutate) {
    if (reduced) { mutate(); return; }
    revealAll();
    clearTimeout(cleanupTimer);
    const first = new Map(items.map((el) => [el, el.getBoundingClientRect()]));
    mutate();
    /* clear any in-flight transforms BEFORE measuring the new layout,
       so an interrupted morph re-targets from true positions */
    items.forEach((el) => {
      el.style.transition = 'none';
      el.style.transform = '';
    });
    void grid.offsetHeight;
    const second = new Map(items.map((el) => [el, el.getBoundingClientRect()]));
    items.forEach((el) => {
      const a = first.get(el);
      const b = second.get(el);
      if (!a || !b || !a.width || !b.width) return;
      const dx = a.left - b.left;
      const dy = a.top - b.top;
      const sx = a.width / b.width;
      const sy = a.height / b.height;
      el.style.transformOrigin = '0 0';
      el.style.transform = 'translate(' + dx + 'px,' + dy + 'px) scale(' + sx + ',' + sy + ')';
      const fr = el.querySelector('.frame');
      fr.style.transition = 'none';
      fr.style.filter = 'blur(6px)';
      fr.style.transform = 'scale(1.04)';
    });
    requestAnimationFrame(() => requestAnimationFrame(() => {
      items.forEach((el) => {
        el.style.transition = 'transform 780ms cubic-bezier(0.77,0,0.175,1)';
        el.style.transform = '';
        const fr = el.querySelector('.frame');
        fr.style.transition = 'filter 780ms cubic-bezier(0.77,0,0.175,1), transform 780ms cubic-bezier(0.77,0,0.175,1)';
        fr.style.filter = '';
        fr.style.transform = '';
      });
      cleanupTimer = setTimeout(() => {
        items.forEach((el) => {
          el.style.transition = '';
          el.style.transformOrigin = '';
          const fr = el.querySelector('.frame');
          fr.style.transition = '';
        });
      }, 820);
    }));
  }

  /* ---- density zoom: the grid re-fits the screen at each state ---- */
  const LEVELS = [1, 2, 3, 4, 5, 6, 8];
  const zoomPct = document.getElementById('zoom-pct');
  const defaultIdx = LEVELS.indexOf(innerWidth < 600 ? 2 : innerWidth < 900 ? 3 : 4);
  let idx = defaultIdx;

  function setLevel(n) {
    n = Math.min(LEVELS.length - 1, Math.max(0, n));
    if (n === idx) return;
    idx = n;
    flip(() => { grid.style.columns = LEVELS[idx]; });
    zoomPct.textContent = LEVELS[idx] + ' col';
  }

  let acc = 0;
  let lastStep = 0;
  window.addEventListener('wheel', (e) => {
    if (!(e.ctrlKey || e.metaKey)) return;
    if (lightbox.classList.contains('open')) return;
    e.preventDefault();
    const now = performance.now();
    if (now - lastStep < 300) { acc = 0; return; }
    acc += e.deltaY;
    if (acc > 40) { setLevel(idx + 1); acc = 0; lastStep = now; }
    else if (acc < -40) { setLevel(idx - 1); acc = 0; lastStep = now; }
  }, { passive: false });

  document.addEventListener('keydown', (e) => {
    if (lightbox.classList.contains('open')) return;
    if (e.key === '+' || e.key === '=') setLevel(idx - 1);
    if (e.key === '-') setLevel(idx + 1);
    if (e.key === '0') setLevel(defaultIdx);
  });

  document.getElementById('zoom-in').addEventListener('click', () => setLevel(idx - 1));
  document.getElementById('zoom-out').addEventListener('click', () => setLevel(idx + 1));
  zoomPct.addEventListener('click', () => setLevel(defaultIdx));

  /* touch pinch — same density morph on mobile */
  let pinchDist = 0;
  const dist = (t) => Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY);
  window.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) pinchDist = dist(e.touches);
  }, { passive: true });
  window.addEventListener('touchmove', (e) => {
    if (e.touches.length !== 2 || lightbox.classList.contains('open')) return;
    e.preventDefault();
    const d = dist(e.touches);
    if (!pinchDist) { pinchDist = d; return; }
    const r = d / pinchDist;
    if (r > 1.3) { setLevel(idx - 1); pinchDist = d; }
    else if (r < 0.77) { setLevel(idx + 1); pinchDist = d; }
  }, { passive: false });
  window.addEventListener('touchend', () => { pinchDist = 0; });

  /* ---- shuffle ---- */
  document.getElementById('shuffle').addEventListener('click', () => {
    flip(() => {
      const order = items.slice();
      for (let i = order.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [order[i], order[j]] = [order[j], order[i]];
      }
      order.forEach((el) => grid.appendChild(el));
      items = order;
      visible = items.filter((el) => el.style.display !== 'none');
    });
  });

  /* ---- year / location filters (hidden dropdown panel) ---- */
  const fstate = { year: 'all', loc: 'all' };
  const fpanel = document.getElementById('fpanel');
  const ftoggle = document.getElementById('filter-toggle');
  const acount = document.getElementById('acount');

  function updateFilterUI() {
    const n = (fstate.year !== 'all' ? 1 : 0) + (fstate.loc !== 'all' ? 1 : 0);
    ftoggle.textContent = 'Filter (' + n + ')';
    acount.textContent = 'Archive (' + visible.length + ')';
  }

  ftoggle.addEventListener('click', () => fpanel.classList.toggle('open'));
  document.getElementById('filter-close').addEventListener('click', () => fpanel.classList.remove('open'));

  function applyFilter() {
    flip(() => {
      items.forEach((el) => {
        const ok =
          (fstate.year === 'all' || el.dataset.year === fstate.year) &&
          (fstate.loc === 'all' || el.dataset.loc === fstate.loc);
        el.style.display = ok ? '' : 'none';
      });
      visible = items.filter((el) => el.style.display !== 'none');
    });
    updateFilterUI();
  }

  document.querySelectorAll('[data-fy]').forEach((b) => {
    b.addEventListener('click', () => {
      fstate.year = b.dataset.fy;
      document.querySelectorAll('[data-fy]').forEach((x) => x.classList.toggle('on', x === b));
      applyFilter();
    });
  });

  document.querySelectorAll('[data-fl]').forEach((b) => {
    b.addEventListener('click', () => {
      fstate.loc = b.dataset.fl;
      document.querySelectorAll('[data-fl]').forEach((x) => x.classList.toggle('on', x === b));
      applyFilter();
    });
  });

  /* ---- video: play on hover (desktop), play in view (touch) ---- */
  const vids = Array.from(grid.querySelectorAll('video'));
  if (matchMedia('(hover: hover) and (pointer: fine)').matches) {
    vids.forEach((v) => {
      const fig = v.closest('.item');
      fig.addEventListener('mouseenter', () => v.play().catch(() => {}));
      fig.addEventListener('mouseleave', () => v.pause());
    });
  } else {
    const autoplay = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) e.target.play().catch(() => {});
        else e.target.pause();
      });
    }, { threshold: 0.5 });
    vids.forEach((v) => autoplay.observe(v));
  }

  /* ---- lightbox (delegated, follows current order) ---- */
  const lightbox = document.getElementById('lightbox');
  const lbImg = document.getElementById('lb-img');
  const lbVid = document.getElementById('lb-vid');
  const lbCounter = document.getElementById('lb-counter');
  let current = -1;

  function show(i) {
    current = (i + visible.length) % visible.length;
    const item = visible[current];
    lbCounter.textContent = item.querySelector('figcaption').textContent + ' / ' + total;
    lbImg.classList.remove('ready');
    lbVid.classList.remove('ready');
    const vid = item.querySelector('video');
    if (vid) {
      lbImg.style.display = 'none';
      lbVid.style.display = 'block';
      lbVid.src = vid.src;
      lbVid.oncanplay = () => {
        lbVid.oncanplay = null;
        lbVid.play().catch(() => {});
        requestAnimationFrame(() => requestAnimationFrame(() => lbVid.classList.add('ready')));
      };
      lbVid.load();
      return;
    }
    lbVid.pause();
    lbVid.style.display = 'none';
    lbImg.style.display = 'block';
    const src = item.querySelector('img').src;
    const pre = new Image();
    pre.onload = () => {
      lbImg.src = src;
      requestAnimationFrame(() => requestAnimationFrame(() => lbImg.classList.add('ready')));
    };
    pre.src = src;
  }

  function open(i) {
    lightbox.classList.add('open');
    document.body.classList.add('locked');
    show(i);
  }

  function close() {
    lightbox.classList.remove('open');
    lbImg.classList.remove('ready');
    lbVid.classList.remove('ready');
    lbVid.pause();
    document.body.classList.remove('locked');
    current = -1;
  }

  grid.addEventListener('click', (e) => {
    const fig = e.target.closest('.item');
    if (!fig) return;
    open(visible.indexOf(fig));
  });
  document.getElementById('lb-close').addEventListener('click', close);
  document.getElementById('lb-prev').addEventListener('click', () => show(current - 1));
  document.getElementById('lb-next').addEventListener('click', () => show(current + 1));
  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) close();
  });

  document.addEventListener('keydown', (e) => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape') close();
    if (e.key === 'ArrowLeft') show(current - 1);
    if (e.key === 'ArrowRight') show(current + 1);
  });
</script>
