<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAEIN JUNG</title>
<meta name="description" content="A visual archive of self.">
<style>
  :root {
    --paper: #ffffff;
    --ink: #0a0a0a;
    --ink-soft: rgba(10, 10, 10, 0.35);
    --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: 10px;
    letter-spacing: 0.06em;
    -webkit-font-smoothing: antialiased;
    text-transform: uppercase;
  }

  ::selection { background: var(--ink); color: var(--paper); }

  /* ---------- canvas + grid ---------- */

  .canvas {
    margin: 0 auto;
  }

  .masonry {
    width: 100vw;
    columns: 4;
    column-gap: 0;
    transform-origin: 0 0;
  }

  .item {
    position: relative;
    break-inside: avoid;
    cursor: crosshair;
    overflow: hidden; /* blur stays exactly inside the image bounds */
  }

  .frame { display: block; overflow: hidden; }

  /* modular vertical rhythm — 6 / 12 / 24, repeating */
  .sp-a { margin-bottom: 6vh; }
  .sp-b { margin-bottom: 12vh; }
  .sp-c { margin-bottom: 24vh; }

  .item img {
    display: block;
    width: 100%;
    height: auto;
    background: #f2f2f2;
    filter: saturate(0.72) contrast(0.97);
  }

  .item figcaption {
    display: block;
    padding: 7px 10px 0;
    height: 24px;
    font-size: 9.5px;
    letter-spacing: 0.1em;
    color: var(--ink);
  }

  /* ---------- reveal motion ---------- */

  .item {
    opacity: 0;
    transition: opacity 900ms var(--ease-out);
    transition-delay: var(--d, 0ms);
  }

  .item .frame {
    filter: blur(12px);
    transform: scale(1.04);
    transition:
      filter 900ms var(--ease-out),
      transform 900ms var(--ease-out);
    transition-delay: var(--d, 0ms);
  }

  .item.in { opacity: 1; }

  .item.in .frame {
    filter: blur(0);
    transform: scale(1);
  }

  @media (hover: hover) and (pointer: fine) {
    .item img {
      will-change: filter, transform;
      transition: filter 220ms var(--ease-out), transform 220ms var(--ease-out);
    }
    .item:hover img { filter: saturate(1) contrast(1); }
    .masonry:has(.item:hover) .item:not(:hover) img {
      filter: blur(6px) saturate(0.72) contrast(0.97);
      transform: scale(1.05); /* covers the blur's soft edge inside the frame */
    }
    .item figcaption { transition: filter 220ms var(--ease-out); }
    .masonry:has(.item:hover) .item:not(:hover) figcaption { filter: blur(2.5px); }
  }

  /* ---------- lightbox ---------- */

  .lightbox {
    position: fixed;
    inset: 0;
    z-index: 60;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.75);
    -webkit-backdrop-filter: blur(24px) saturate(1.1);
    backdrop-filter: blur(24px) saturate(1.1);
    opacity: 0;
    pointer-events: none;
    transition: opacity 360ms var(--ease-out);
  }

  .lightbox.open {
    opacity: 1;
    pointer-events: auto;
  }

  .lightbox img {
    max-width: min(88vw, 1240px);
    max-height: 80vh;
    display: block;
    transform: scale(0.97);
    filter: blur(10px);
    opacity: 0;
    transition:
      transform 560ms var(--ease-out),
      filter 560ms var(--ease-out),
      opacity 560ms var(--ease-out);
  }

  .lightbox.open img.ready {
    transform: scale(1);
    filter: blur(0);
    opacity: 1;
  }

  .lightbox .lb-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    padding: 14px 16px;
    font-size: 10px;
    letter-spacing: 0.12em;
  }

  .lightbox button {
    all: unset;
    font: inherit;
    letter-spacing: inherit;
    text-transform: inherit;
    cursor: pointer;
    color: var(--ink);
    transition: transform 160ms var(--ease-out);
  }

  .lightbox button:active { transform: scale(0.95); }

  .lb-zone {
    position: absolute;
    top: 0; bottom: 0;
    width: 50%;
    z-index: -1;
  }
  .lb-zone--prev { left: 0; cursor: w-resize; }
  .lb-zone--next { right: 0; cursor: e-resize; }

  body.locked { overflow: hidden; }

  /* ---------- zoom control ---------- */

  .zoom {
    position: fixed;
    right: 16px;
    bottom: 16px;
    z-index: 40;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 16px;
    font-size: 10px;
    letter-spacing: 0.12em;
    background: #fafafa;
    border-radius: 14px;
    box-shadow:
      6px 6px 14px rgba(10, 10, 10, 0.09),
      -6px -6px 14px rgba(255, 255, 255, 1),
      inset 0 0 0 1px rgba(255, 255, 255, 0.6);
    transition: box-shadow 200ms var(--ease-out);
  }

  .zoom:has(button:active) {
    box-shadow:
      inset 3px 3px 8px rgba(10, 10, 10, 0.07),
      inset -3px -3px 8px rgba(255, 255, 255, 1);
  }

  .zoom button {
    all: unset;
    font: inherit;
    letter-spacing: inherit;
    cursor: pointer;
    color: var(--ink);
    transition: transform 160ms var(--ease-out);
  }

  .zoom button:active { transform: scale(0.94); }

  .zoom button svg { display: block; }

  .zoom .pct {
    color: var(--ink-soft);
    min-width: 44px;
    text-align: center;
  }

  .zoom--left {
    right: auto;
    left: 16px;
    padding: 12px;
  }

  /* ---------- mobile ---------- */

  @media (max-width: 900px) {
    .masonry { columns: 3; }
    .sp-a { margin-bottom: 4vh; }
    .sp-b { margin-bottom: 8vh; }
    .sp-c { margin-bottom: 16vh; }
  }

  @media (max-width: 600px) {
    .masonry { columns: 2; }
    .item figcaption { font-size: 8.5px; }
  }

  /* ---------- reduced motion ---------- */

  @media (prefers-reduced-motion: reduce) {
    .item {
      transition: opacity 300ms ease;
    }
    .item .frame {
      filter: none;
      transform: none;
      transition: none;
    }
    .lightbox img {
      transform: none;
      filter: none;
      transition: opacity 300ms ease;
    }
  }
</style>
</head>
<body>

</div>

<div class="zoom zoom--left" aria-label="Shuffle">
  <button id="shuffle" aria-label="Shuffle order">
    <svg width="16" height="12" viewBox="0 0 17 12" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M1 2.5h3l8 7h3.5"/>
      <path d="M1 9.5h3l8-7h3.5"/>
      <path d="M13.3 0.3L15.7 2.5L13.3 4.7"/>
      <path d="M13.3 7.3L15.7 9.5L13.3 11.7"/>
    </svg>
  </button>
</div>

<div class="zoom" aria-label="Zoom">
  <button id="zoom-out" aria-label="Zoom out">&minus;</button>
  <button class="pct" id="zoom-pct" aria-label="Reset zoom">4 col</button>
  <button id="zoom-in" aria-label="Zoom in">+</button>
</div>

<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
  <div class="lb-bar">
    <span id="lb-counter">001 / 033</span>
    <button id="lb-close" aria-label="Close">Close</button>
  </div>
  <div class="lb-zone lb-zone--prev" id="lb-prev" aria-hidden="true"></div>
  <div class="lb-zone lb-zone--next" id="lb-next" aria-hidden="true"></div>
  <img id="lb-img" src="" alt="">
</div>

<script>
  const grid = document.getElementById('grid');
  let items = Array.from(grid.querySelectorAll('.item'));
  const total = String(items.length).padStart(3, '0');
  const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;

  /* ---- scroll reveal with per-batch stagger ---- */
  let batch = 0;
  let batchTime = 0;
  const reveal = new IntersectionObserver((entries) => {
    const now = performance.now();
    if (now - batchTime > 150) batch = 0;
    entries.forEach((entry) => {
      if (!entry.isIntersecting) return;
      entry.target.style.setProperty('--d', (batch * 60) + 'ms');
      batch += 1;
      batchTime = now;
      entry.target.classList.add('in');
      reveal.unobserve(entry.target);
    });
  }, { rootMargin: '0px 0px -5% 0px', threshold: 0.05 });
  items.forEach((el) => reveal.observe(el));

  function revealAll() {
    items.forEach((el) => {
      el.style.setProperty('--d', '0ms');
      el.classList.add('in');
      reveal.unobserve(el);
    });
  }

  /* ---- FLIP morph: everything glides + blurs to its new place.
     Interruptible — a new morph starts from current visual positions,
     so continuous gestures stay fluid ---- */
  let cleanupTimer = 0;

  function flip(mutate) {
    if (reduced) { mutate(); return; }
    revealAll();
    clearTimeout(cleanupTimer);
    const first = new Map(items.map((el) => [el, el.getBoundingClientRect()]));
    mutate();
    /* clear any in-flight transforms BEFORE measuring the new layout,
       so an interrupted morph re-targets from true positions */
    items.forEach((el) => {
      el.style.transition = 'none';
      el.style.transform = '';
    });
    void grid.offsetHeight;
    const second = new Map(items.map((el) => [el, el.getBoundingClientRect()]));
    items.forEach((el) => {
      const a = first.get(el);
      const b = second.get(el);
      if (!a || !b) return;
      const dx = a.left - b.left;
      const dy = a.top - b.top;
      const sx = a.width / b.width;
      const sy = a.height / b.height;
      el.style.transformOrigin = '0 0';
      el.style.transform = 'translate(' + dx + 'px,' + dy + 'px) scale(' + sx + ',' + sy + ')';
      const fr = el.querySelector('.frame');
      fr.style.transition = 'none';
      fr.style.filter = 'blur(6px)';
      fr.style.transform = 'scale(1.04)';
    });
    requestAnimationFrame(() => requestAnimationFrame(() => {
      items.forEach((el) => {
        el.style.transition = 'transform 780ms cubic-bezier(0.77,0,0.175,1)';
        el.style.transform = '';
        const fr = el.querySelector('.frame');
        fr.style.transition = 'filter 780ms cubic-bezier(0.77,0,0.175,1), transform 780ms cubic-bezier(0.77,0,0.175,1)';
        fr.style.filter = '';
        fr.style.transform = '';
      });
      cleanupTimer = setTimeout(() => {
        items.forEach((el) => {
          el.style.transition = '';
          el.style.transformOrigin = '';
          const fr = el.querySelector('.frame');
          fr.style.transition = '';
        });
      }, 820);
    }));
  }

  /* ---- density zoom: the grid re-fits the screen at each state ---- */
  const LEVELS = [1, 2, 3, 4, 5, 6, 8];
  const zoomPct = document.getElementById('zoom-pct');
  const defaultIdx = LEVELS.indexOf(innerWidth < 600 ? 2 : innerWidth < 900 ? 3 : 4);
  let idx = defaultIdx;

  function setLevel(n) {
    n = Math.min(LEVELS.length - 1, Math.max(0, n));
    if (n === idx) return;
    idx = n;
    flip(() => { grid.style.columns = LEVELS[idx]; });
    zoomPct.textContent = LEVELS[idx] + ' col';
  }

  let acc = 0;
  let lastStep = 0;
  window.addEventListener('wheel', (e) => {
    if (!(e.ctrlKey || e.metaKey)) return;
    if (lightbox.classList.contains('open')) return;
    e.preventDefault();
    const now = performance.now();
    if (now - lastStep < 300) { acc = 0; return; }
    acc += e.deltaY;
    if (acc > 40) { setLevel(idx + 1); acc = 0; lastStep = now; }
    else if (acc < -40) { setLevel(idx - 1); acc = 0; lastStep = now; }
  }, { passive: false });

  document.addEventListener('keydown', (e) => {
    if (lightbox.classList.contains('open')) return;
    if (e.key === '+' || e.key === '=') setLevel(idx - 1);
    if (e.key === '-') setLevel(idx + 1);
    if (e.key === '0') setLevel(defaultIdx);
  });

  document.getElementById('zoom-in').addEventListener('click', () => setLevel(idx - 1));
  document.getElementById('zoom-out').addEventListener('click', () => setLevel(idx + 1));
  zoomPct.addEventListener('click', () => setLevel(defaultIdx));

  /* touch pinch — same density morph on mobile */
  let pinchDist = 0;
  const dist = (t) => Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY);
  window.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) pinchDist = dist(e.touches);
  }, { passive: true });
  window.addEventListener('touchmove', (e) => {
    if (e.touches.length !== 2 || lightbox.classList.contains('open')) return;
    e.preventDefault();
    const d = dist(e.touches);
    if (!pinchDist) { pinchDist = d; return; }
    const r = d / pinchDist;
    if (r > 1.3) { setLevel(idx - 1); pinchDist = d; }
    else if (r < 0.77) { setLevel(idx + 1); pinchDist = d; }
  }, { passive: false });
  window.addEventListener('touchend', () => { pinchDist = 0; });

  /* ---- shuffle ---- */
  document.getElementById('shuffle').addEventListener('click', () => {
    flip(() => {
      const order = items.slice();
      for (let i = order.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [order[i], order[j]] = [order[j], order[i]];
      }
      order.forEach((el) => grid.appendChild(el));
      items = order;
    });
  });

  /* ---- lightbox (delegated, follows current order) ---- */
  const lightbox = document.getElementById('lightbox');
  const lbImg = document.getElementById('lb-img');
  const lbCounter = document.getElementById('lb-counter');
  let current = -1;

  function show(i) {
    current = (i + items.length) % items.length;
    const src = items[current].querySelector('img').src;
    lbImg.classList.remove('ready');
    lbCounter.textContent = items[current].querySelector('figcaption').textContent + ' / ' + total;
    const pre = new Image();
    pre.onload = () => {
      lbImg.src = src;
      requestAnimationFrame(() => requestAnimationFrame(() => lbImg.classList.add('ready')));
    };
    pre.src = src;
  }

  function open(i) {
    lightbox.classList.add('open');
    document.body.classList.add('locked');
    show(i);
  }

  function close() {
    lightbox.classList.remove('open');
    lbImg.classList.remove('ready');
    document.body.classList.remove('locked');
    current = -1;
  }

  grid.addEventListener('click', (e) => {
    const fig = e.target.closest('.item');
    if (!fig) return;
    open(items.indexOf(fig));
  });
  document.getElementById('lb-close').addEventListener('click', close);
  document.getElementById('lb-prev').addEventListener('click', () => show(current - 1));
  document.getElementById('lb-next').addEventListener('click', () => show(current + 1));
  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) close();
  });

  document.addEventListener('keydown', (e) => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape') close();
    if (e.key === 'ArrowLeft') show(current - 1);
    if (e.key === 'ArrowRight') show(current + 1);
  });
</script>

</body>
</html>
