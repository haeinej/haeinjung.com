<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Writing — Haein Jung</title>
  <meta name="robots" content="noindex, nofollow, noarchive">
  <meta http-equiv="refresh" content="0; url=/writing/">
  <link rel="canonical" href="https://haeinjung.com/writing/">
  <style>
    :root {
      --bg: #050914;
      --bg-strong: #08101f;
      --ink: #f5f1e8;
      --muted: rgba(245, 241, 232, 0.72);
      --line: rgba(245, 241, 232, 0.12);
      --sans: "Instrument Sans", sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--ink);
      font-family: var(--sans);
      background: linear-gradient(180deg, var(--bg) 0%, var(--bg-strong) 100%);
      -webkit-font-smoothing: antialiased;
    }

    main {
      max-width: 540px;
      text-align: center;
      padding: 32px 28px;
      border: 1px solid var(--line);
    }

    h1 {
      font-size: clamp(1.7rem, 5vw, 2.4rem);
      line-height: 1;
      margin-bottom: 14px;
    }

    p {
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 18px;
    }

    a {
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid currentColor;
    }
  </style>
</head>
<body>
  <main>
    <h1>This writing is private.</h1>
    <p>You are being redirected back to the writing index.</p>
    <p><a href="/writing/">Return to writing</a></p>
  </main>
  <script>
    window.location.replace("/writing/");
  </script>
</body>
</html>
